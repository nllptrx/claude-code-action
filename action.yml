name: "Claude Code Action Official"
description: "General-purpose Claude agent for GitHub PRs and issues. Can answer questions and implement code changes."
branding:
  icon: "at-sign"
  color: "orange"

inputs:
  trigger_phrase:
    description: "The trigger phrase to look for in comments or issue body"
    required: false
    default: "@claude"
  assignee_trigger:
    description: "The assignee username that triggers the action (e.g. @claude)"
    required: false
  label_trigger:
    description: "The label that triggers the action (e.g. claude)"
    required: false
    default: "claude"
  branch_prefix:
    description: "The prefix to use for Claude branches (defaults to 'claude/', use 'claude-' for dash format)"
    required: false
    default: "claude/"
  mode:
    description: "Execution mode for the action. Valid modes: 'tag' (default) or 'agent'"
    required: false
    default: "tag"
  base_branch:
    description: "The branch to use as the base/source when creating new branches (defaults to repository default branch)"
    required: false

  # Claude Code configuration
  model:
    description: "Model to use (provider-specific format required for Bedrock/Vertex)"
    required: false
  anthropic_model:
    description: "DEPRECATED: Use 'model' instead. Model to use (provider-specific format required for Bedrock/Vertex)"
    required: false
  allowed_tools:
    description: "Additional tools for Claude to use (the base GitHub tools will always be included)"
    required: false
    default: ""
  disallowed_tools:
    description: "Tools that Claude should never use"
    required: false
    default: ""
  custom_instructions:
    description: "Additional custom instructions to include in the prompt for Claude"
    required: false
    default: ""
  direct_prompt:
    description: "Direct instruction for Claude (bypasses normal trigger detection)"
    required: false
    default: ""
  override_prompt:
    description: "Complete replacement of Claude's prompt with custom template (supports variable substitution)"
    required: false
    default: ""
  include_comments_by_actor:
    description: "Comma-separated list of actor usernames to INCLUDE in comments. Supports wildcards: '*[bot]' matches all bots, 'dependabot[bot]' matches specific bot. Empty (default) includes all actors."
    required: false
    default: ""
  exclude_comments_by_actor:
    description: "Comma-separated list of actor usernames to EXCLUDE from comments. Supports wildcards: '*[bot]' matches all bots, 'renovate[bot]' matches specific bot. Empty (default) excludes none. If actor is in both lists, exclusion takes priority."
    required: false
    default: ""
  allowed_non_write_users:
    description: |
      Comma-separated list of usernames to allow without write permissions, or '*' to allow all users.
      Only works when `gitea_token` input is provided. WARNING: Use with extreme caution - this
      bypasses security checks and should only be used for workflows with very limited permissions
      (e.g., issue labeling).
    required: false
    default: ""
  allowed_bots:
    description: "Comma-separated list of allowed bot usernames, or '*' to allow all bots. Empty string (default) allows no bots. Gitea's User API doesn't expose a bot type, so this is only consulted when the action runs against github.com (fallback path)."
    required: false
    default: ""
  include_fix_links:
    description: "Include 'Fix this →' links in PR code review feedback that open Claude Code with context to fix the identified issue."
    required: false
    default: "true"
  bot_id:
    description: "Numeric user ID of the account Claude should impersonate for git commits (used in the noreply email format `{id}+{login}@users.noreply.{host}`). Distinct from `claude_git_email` / `claude_git_name`, which set the raw git author strings. When set together with `bot_name`, overrides the fallback identity inside `configureGitAuth`."
    required: false
    default: ""
  bot_name:
    description: "Username/login of the account Claude should impersonate for git commits (companion to `bot_id`). When both `bot_id` and `bot_name` are set, `configureGitAuth` uses them instead of the hard-coded github-actions[bot] fallback."
    required: false
    default: ""

  # New Claude Code settings
  settings:
    description: "Path to Claude Code settings JSON file, or settings JSON string"
    required: false
    default: ""
  system_prompt:
    description: "Override system prompt"
    required: false
    default: ""
  append_system_prompt:
    description: "Append to system prompt"
    required: false
    default: ""
  claude_env:
    description: "Custom environment variables to pass to Claude Code execution (YAML multiline format)"
    required: false
    default: ""
  additional_permissions:
    description: "Additional permissions to enable. Currently supports 'actions: read' for viewing workflow results"
    required: false
    default: ""
  fallback_model:
    description: "Enable automatic fallback to specified model when default model is overloaded"
    required: false
    default: ""

  # Auth configuration
  anthropic_api_key:
    description: "Anthropic API key (required for direct API, not needed for Bedrock/Vertex/Foundry)"
    required: false
  claude_code_oauth_token:
    description: "Claude Code OAuth token (alternative to anthropic_api_key)"
    required: false
    default: ""
  gitea_token:
    description: "Gitea token with repo and pull request permissions (defaults to GITHUB_TOKEN)"
    required: false
  github_token:
    description: "GitHub token with repo and pull request permissions (optional if using GitHub App)"
    required: false
  path_to_claude_code_executable:
    description: "Path to a custom Claude Code executable to use instead of installing"
    required: false
    default: ""
  path_to_bun_executable:
    description: "Optional path to a custom Bun executable. If provided, skips automatic Bun installation and uses this executable instead. WARNING: Using an incompatible version may cause problems if the action requires specific Bun features. This input is typically not needed unless you're debugging something specific or have unique needs in your environment."
    required: false
    default: ""
  use_bedrock:
    description: "Use Amazon Bedrock with OIDC authentication instead of direct Anthropic API"
    required: false
    default: "false"
  use_vertex:
    description: "Use Google Vertex AI with OIDC authentication instead of direct Anthropic API"
    required: false
    default: "false"
  use_node_cache:
    description: "Whether to use Node.js dependency caching (set to true only for Node.js projects with lock files)"
    required: false
    default: "false"

  max_turns:
    description: "Maximum number of conversation turns"
    required: false
    default: ""
  timeout_minutes:
    description: "Timeout in minutes for execution"
    required: false
    default: "30"
  claude_git_name:
    description: "Git user.name for commits made by Claude"
    required: false
    default: "Claude"
  claude_git_email:
    description: "Git user.email for commits made by Claude"
    required: false
    default: "claude@anthropic.com"
  ssh_signing_key:
    description: "SSH private key for signing commits. When provided, git will be configured to use SSH signing. Takes precedence over use_commit_signing."
    required: false
    default: ""
  prompt:
    description: "Explicit prompt for Claude (alternative to direct_prompt/override_prompt). Forwarded to the action as $PROMPT."
    required: false
    default: ""
  branch_name_template:
    description: "Template for generated branch names. Placeholders are expanded by src/utils/branch-template.ts."
    required: false
    default: ""

  # Activated by the local ./base-action switch (unified run.ts entrypoint).
  show_full_output:
    description: "Show full JSON output from Claude Code. WARNING: outputs ALL Claude messages including tool execution results which may contain secrets. Only enable for debugging in non-sensitive environments."
    required: false
    default: "false"
  plugins:
    description: "Newline-separated list of Claude Code plugin names to install (e.g. 'code-review@claude-code-plugins')."
    required: false
    default: ""
  plugin_marketplaces:
    description: "Newline-separated list of Claude Code plugin marketplace Git URLs to install from."
    required: false
    default: ""
  display_report:
    description: "Render Claude's execution turns as a Step Summary at the end of the run. Set 'false' to suppress."
    required: false
    default: "true"

outputs:
  execution_file:
    description: "Path to the Claude Code execution output file"
    value: ${{ steps.run.outputs.execution_file }}
  branch_name:
    description: "The branch created by Claude Code for this execution"
    value: ${{ steps.run.outputs.CLAUDE_BRANCH }}
  conclusion:
    description: "Execution status of Claude Code ('success' or 'failure')"
    value: ${{ steps.run.outputs.conclusion }}
  session_id:
    description: "Claude Code session ID for --resume continuation"
    value: ${{ steps.run.outputs.session_id }}
  structured_output:
    description: "JSON string containing all structured output fields when --json-schema is provided"
    value: ${{ steps.run.outputs.structured_output }}

runs:
  using: "composite"
  steps:
    - name: Install Bun
      if: inputs.path_to_bun_executable == ''
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # https://github.com/oven-sh/setup-bun/releases/tag/v2.2.0
      with:
        bun-version: 1.3.6
        token: ${{ inputs.github_token || github.token }}

    - name: Setup Custom Bun Path
      if: inputs.path_to_bun_executable != ''
      shell: bash
      env:
        PATH_TO_BUN_EXECUTABLE: ${{ inputs.path_to_bun_executable }}
      run: |
        echo "Using custom Bun executable: $PATH_TO_BUN_EXECUTABLE"
        BUN_DIR=$(dirname "$PATH_TO_BUN_EXECUTABLE")
        echo "$BUN_DIR" >> "$GITHUB_PATH"

    - name: Install Dependencies
      shell: bash
      run: |
        cd ${{ github.action_path }}
        bun install
        cd base-action
        bun install

    - name: Run Claude Code Action
      id: run
      shell: bash
      run: |
        bun run ${{ github.action_path }}/src/entrypoints/run.ts
      env:
        # --- prepare-phase inputs (consumed by parseGitHubContext / modes) ---
        MODE: ${{ inputs.mode }}
        TRIGGER_PHRASE: ${{ inputs.trigger_phrase }}
        ASSIGNEE_TRIGGER: ${{ inputs.assignee_trigger }}
        LABEL_TRIGGER: ${{ inputs.label_trigger }}
        BASE_BRANCH: ${{ inputs.base_branch }}
        BRANCH_PREFIX: ${{ inputs.branch_prefix }}
        ALLOWED_TOOLS: ${{ inputs.allowed_tools }}
        DISALLOWED_TOOLS: ${{ inputs.disallowed_tools }}
        CUSTOM_INSTRUCTIONS: ${{ inputs.custom_instructions }}
        DIRECT_PROMPT: ${{ inputs.direct_prompt }}
        OVERRIDE_PROMPT: ${{ inputs.override_prompt }}
        PROMPT: ${{ inputs.prompt }}
        BRANCH_NAME_TEMPLATE: ${{ inputs.branch_name_template }}
        SSH_SIGNING_KEY: ${{ inputs.ssh_signing_key }}
        ALLOWED_NON_WRITE_USERS: ${{ inputs.allowed_non_write_users }}
        ALLOWED_BOTS: ${{ inputs.allowed_bots }}
        INCLUDE_FIX_LINKS: ${{ inputs.include_fix_links }}
        BOT_ID: ${{ inputs.bot_id }}
        BOT_NAME: ${{ inputs.bot_name }}
        ADDITIONAL_PERMISSIONS: ${{ inputs.additional_permissions }}
        INCLUDE_COMMENTS_BY_ACTOR: ${{ inputs.include_comments_by_actor }}
        EXCLUDE_COMMENTS_BY_ACTOR: ${{ inputs.exclude_comments_by_actor }}
        OVERRIDE_GITHUB_TOKEN: ${{ inputs.gitea_token }}
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        PATH_TO_CLAUDE_CODE_EXECUTABLE: ${{ inputs.path_to_claude_code_executable }}

        # --- run-phase inputs (consumed by base-action code) ---
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude_code_oauth_token }}
        ANTHROPIC_MODEL: ${{ inputs.model || inputs.anthropic_model }}
        MODEL: ${{ inputs.model || inputs.anthropic_model }}
        MAX_TURNS: ${{ inputs.max_turns }}
        TIMEOUT_MINUTES: ${{ inputs.timeout_minutes }}
        SYSTEM_PROMPT: ${{ inputs.system_prompt }}
        APPEND_SYSTEM_PROMPT: ${{ inputs.append_system_prompt }}
        FALLBACK_MODEL: ${{ inputs.fallback_model }}
        CLAUDE_ENV: ${{ inputs.claude_env }}
        USE_BEDROCK: ${{ inputs.use_bedrock }}
        USE_VERTEX: ${{ inputs.use_vertex }}
        USE_NODE_CACHE: ${{ inputs.use_node_cache }}

        # --- new local-base-action inputs (activated by this migration) ---
        INPUT_SETTINGS: ${{ inputs.settings }}
        INPUT_SHOW_FULL_OUTPUT: ${{ inputs.show_full_output }}
        INPUT_PLUGINS: ${{ inputs.plugins }}
        INPUT_PLUGIN_MARKETPLACES: ${{ inputs.plugin_marketplaces }}
        INPUT_PATH_TO_CLAUDE_CODE_EXECUTABLE: ${{ inputs.path_to_claude_code_executable }}
        DISPLAY_REPORT: ${{ inputs.display_report }}

        # --- git config (used by configureGitAuth fallback) ---
        CLAUDE_GIT_NAME: ${{ inputs.claude_git_name }}
        CLAUDE_GIT_EMAIL: ${{ inputs.claude_git_email }}

        # --- cloud provider passthrough (for future Bedrock/Vertex support) ---
        AWS_REGION: ${{ env.AWS_REGION }}
        AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
        AWS_SESSION_TOKEN: ${{ env.AWS_SESSION_TOKEN }}
        ANTHROPIC_BASE_URL: ${{ env.ANTHROPIC_BASE_URL }}
        ANTHROPIC_BEDROCK_BASE_URL: ${{ env.ANTHROPIC_BEDROCK_BASE_URL }}
        ANTHROPIC_VERTEX_PROJECT_ID: ${{ env.ANTHROPIC_VERTEX_PROJECT_ID }}
        CLOUD_ML_REGION: ${{ env.CLOUD_ML_REGION }}
        GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
        ANTHROPIC_VERTEX_BASE_URL: ${{ env.ANTHROPIC_VERTEX_BASE_URL }}
        VERTEX_REGION_CLAUDE_3_5_HAIKU: ${{ env.VERTEX_REGION_CLAUDE_3_5_HAIKU }}
        VERTEX_REGION_CLAUDE_3_5_SONNET: ${{ env.VERTEX_REGION_CLAUDE_3_5_SONNET }}
        VERTEX_REGION_CLAUDE_3_7_SONNET: ${{ env.VERTEX_REGION_CLAUDE_3_7_SONNET }}

        # --- telemetry passthrough ---
        CLAUDE_CODE_ENABLE_TELEMETRY: ${{ env.CLAUDE_CODE_ENABLE_TELEMETRY }}
        OTEL_METRICS_EXPORTER: ${{ env.OTEL_METRICS_EXPORTER }}
        OTEL_LOGS_EXPORTER: ${{ env.OTEL_LOGS_EXPORTER }}
        OTEL_EXPORTER_OTLP_PROTOCOL: ${{ env.OTEL_EXPORTER_OTLP_PROTOCOL }}
        OTEL_EXPORTER_OTLP_ENDPOINT: ${{ env.OTEL_EXPORTER_OTLP_ENDPOINT }}
        OTEL_EXPORTER_OTLP_HEADERS: ${{ env.OTEL_EXPORTER_OTLP_HEADERS }}
        OTEL_METRIC_EXPORT_INTERVAL: ${{ env.OTEL_METRIC_EXPORT_INTERVAL }}
        OTEL_LOGS_EXPORT_INTERVAL: ${{ env.OTEL_LOGS_EXPORT_INTERVAL }}
        OTEL_RESOURCE_ATTRIBUTES: ${{ env.OTEL_RESOURCE_ATTRIBUTES }}

    - name: Update comment with job link
      if: steps.run.outputs.contains_trigger == 'true' && steps.run.outputs.claude_comment_id && always()
      shell: bash
      run: |
        bun run ${{ github.action_path }}/src/entrypoints/update-comment-link.ts
      env:
        REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        CLAUDE_COMMENT_ID: ${{ steps.run.outputs.claude_comment_id }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_TOKEN: ${{ steps.run.outputs.GITHUB_TOKEN }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        TRIGGER_COMMENT_ID: ${{ github.event.comment.id }}
        CLAUDE_BRANCH: ${{ steps.run.outputs.CLAUDE_BRANCH }}
        IS_PR: ${{ github.event.issue.pull_request != null || github.event_name == 'pull_request_review_comment' }}
        BASE_BRANCH: ${{ steps.run.outputs.BASE_BRANCH }}
        CLAUDE_SUCCESS: ${{ steps.run.outputs.claude_success }}
        OUTPUT_FILE: ${{ steps.run.outputs.execution_file || '' }}
        TRIGGER_USERNAME: ${{ github.event.comment.user.login || github.event.issue.user.login || github.event.pull_request.user.login || github.event.sender.login || github.triggering_actor || github.actor || '' }}
        PREPARE_SUCCESS: ${{ steps.run.outputs.prepare_success }}
        PREPARE_ERROR: ${{ steps.run.outputs.prepare_error || '' }}
