# Orchestrates all CI workflows - runs on PRs, pushes to main, and manual dispatch
# Individual test workflows are called as reusable workflows
name: CI All

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Shared gate for reusable test-* sub-workflow calls. When secrets are absent
# (forks, un-configured repos) every called sub-workflow skips all its jobs,
# which leaves ci-all itself in a degenerate "0 jobs, conclusion=failure"
# state that doesn't surface on the PR rollup but hides real signal in the
# Actions tab. Skip the sub-calls at this level instead so ci-all reports
# only what actually ran (ci.yml).
jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  test-base-action:
    if: >-
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository) &&
      (secrets.CLAUDE_CREDENTIALS != '' || secrets.ANTHROPIC_API_KEY != '')
    uses: ./.github/workflows/test-base-action.yml
    secrets: inherit # Required for ANTHROPIC_API_KEY

  test-custom-executables:
    if: >-
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository) &&
      (secrets.CLAUDE_CREDENTIALS != '' || secrets.ANTHROPIC_API_KEY != '')
    uses: ./.github/workflows/test-custom-executables.yml
    secrets: inherit

  test-mcp-servers:
    if: >-
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository) &&
      (secrets.CLAUDE_CREDENTIALS != '' || secrets.ANTHROPIC_API_KEY != '')
    uses: ./.github/workflows/test-mcp-servers.yml
    secrets: inherit

  test-settings:
    if: >-
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository) &&
      (secrets.CLAUDE_CREDENTIALS != '' || secrets.ANTHROPIC_API_KEY != '')
    uses: ./.github/workflows/test-settings.yml
    secrets: inherit

  test-structured-output:
    if: >-
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository) &&
      (secrets.CLAUDE_CREDENTIALS != '' || secrets.ANTHROPIC_API_KEY != '')
    uses: ./.github/workflows/test-structured-output.yml
    secrets: inherit
